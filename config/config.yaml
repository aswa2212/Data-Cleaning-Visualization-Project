# ═══════════════════════════════════════════════════════════════
#  Retail Sales Pipeline — Centralised Configuration  v2.0
# ═══════════════════════════════════════════════════════════════

dataset:
  n_rows: 3000
  seed: 42
  date_range:
    start: "2023-01-01"
    end:   "2024-12-31"

cleaning:
  outlier_iqr_factor: 3.0
  # total_sales intentionally excluded — recomputed from inputs in Step 8
  outlier_cols:
    - unit_price
  rating_min: 1.0
  rating_max: 5.0
  # Drop column if more than this fraction of values are missing
  missing_drop_threshold: 0.50

ml:
  n_estimators: 200
  max_depth: 10
  min_samples_leaf: 5
  test_size: 0.20
  cv_folds: 5
  forecast_months: 3
  random_state: 42

reporting:
  top_n_products: 10
  abc_a_threshold: 0.70   # top products that generate 70% of revenue → Tier A
  abc_b_threshold: 0.90   # next products up to 90% → Tier B; rest → Tier C
